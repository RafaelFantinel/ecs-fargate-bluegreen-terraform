# Rendered by deploy/local-deploy.sh — do not edit default.conf by hand.
# prod listener always points at the active color; test listener at the
# inactive color (where the next deploy lands), mirroring CodeDeploy.

upstream prod_backend {
    server app-green:8080;
}

upstream test_backend {
    server app-blue:8080;
}

server {
    listen 80;

    location / {
        proxy_pass http://prod_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}

server {
    listen 81;

    location / {
        proxy_pass http://test_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
